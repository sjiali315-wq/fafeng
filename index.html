<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台风天·发疯时刻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 20px;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s ease;
      transform-origin: center center;
      overflow-x: hidden;
    }
    body.flipped {
      transform: rotate(180deg) scaleX(-1);
    }
    body.mirror-text {
      filter: invert(1) hue-rotate(180deg);
    }
    .container {
      text-align: center;
      max-width: 700px;
      width: 100%;
    }
    .main-text {
      font-size: clamp(2rem, 8vw, 4.2rem);
      font-weight: 900;
      color: #d4d4d4;
      line-height: 1.3;
      margin-bottom: 50px;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(100,100,100,0.15);
    }
    .btn {
      display: inline-block;
      padding: 18px 56px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #e0e0e0;
      background: #2c2c2c;
      border: 1.5px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 3px;
      font-family: inherit;
      user-select: none;
      position: relative;
    }
    .btn:hover {
      background: #3a3a3a;
      border-color: #666;
      transform: scale(1.03);
    }
    .btn:active {
      transform: scale(0.96);
    }
    .counter-bar {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #444;
      letter-spacing: 1px;
    }
    .counter-bar .count {
      color: #777;
      font-weight: 700;
    }
    .counter-bar .hint {
      color: #3a3a3a;
      font-size: 0.75rem;
      margin-top: 4px;
    }
    .output {
      margin-top: 50px;
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.15s ease;
    }
    .output.fade {
      opacity: 0;
    }
    .quote {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #a0a0a0;
      line-height: 1.5;
      padding: 20px 30px;
      background: #222;
      border-left: 4px solid #555;
      border-radius: 4px;
      max-width: 100%;
      word-break: break-word;
    }
    .sub-quote {
      font-size: 1rem;
      color: #555;
      margin-top: 12px;
    }
    .footer {
      margin-top: 80px;
      font-size: 0.75rem;
      color: #333;
    }

    /* ----- 摇晃动画 ----- */
    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-20px, -10px) rotate(-3deg); }
      20% { transform: translate(20px, 10px) rotate(3deg); }
      30% { transform: translate(-20px, 5px) rotate(-2deg); }
      40% { transform: translate(20px, -5px) rotate(2deg); }
      50% { transform: translate(-10px, 10px) rotate(-1deg); }
      60% { transform: translate(10px, -10px) rotate(1deg); }
      70% { transform: translate(-5px, 5px) rotate(0deg); }
      80% { transform: translate(5px, -5px) rotate(0deg); }
      90% { transform: translate(-2px, 2px) rotate(0deg); }
    }
    body.shaking {
      animation: shake 0.6s ease-in-out;
    }

    /* ----- 遮罩/弹窗 ----- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay-box {
      background: #222;
      border: 1.5px solid #555;
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
      max-width: 500px;
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .overlay.active .overlay-box {
      transform: scale(1);
    }
    .overlay-box .emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .overlay-box .title {
      font-size: 2rem;
      font-weight: 900;
      color: #d4d4d4;
      margin-bottom: 8px;
    }
    .overlay-box .desc {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .overlay-box .close-btn {
      padding: 10px 36px;
      font-size: 1rem;
      font-weight: 700;
      color: #ccc;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .overlay-box .close-btn:hover {
      background: #444;
    }

    /* ----- 五彩纸屑 ----- */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -20px;
      opacity: 0;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.3);
        opacity: 0;
      }
    }

    /* ----- 屏幕裂痕/闪烁 ----- */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      10% { opacity: 0.1; }
      20% { opacity: 0.8; }
      30% { opacity: 0.2; }
      40% { opacity: 0.9; }
      50% { opacity: 0.05; }
      60% { opacity: 0.7; }
      70% { opacity: 0.1; }
      80% { opacity: 0.6; }
      90% { opacity: 0.15; }
    }
    body.flicker {
      animation: flicker 0.8s ease-in-out;
    }

    /* ----- 满屏血红（配合滤色镜） ----- */
    @keyframes blood-flash {
      0% { box-shadow: inset 0 0 0 rgba(255,0,0,0); }
      50% { box-shadow: inset 0 0 200px rgba(139,0,0,0.5); }
      100% { box-shadow: inset 0 0 0 rgba(255,0,0,0); }
    }
    body.blood-flash {
      animation: blood-flash 1.5s ease-in-out;
    }

    /* ----- 鼠标痕迹 "发疯" ----- */
    .mouse-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      font-size: 1.2rem;
      font-weight: 900;
      color: #666;
      opacity: 0;
      animation: trail-fade 0.8s ease-out forwards;
      user-select: none;
    }
    @keyframes trail-fade {
      0% { opacity: 0.8; transform: scale(0.8) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.6) rotate(30deg) translateY(-30px); }
    }

    /* ----- 哭泣 emoji 雨 ----- */
    .crying-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }
    .tear {
      position: absolute;
      top: -40px;
      font-size: 1.5rem;
      animation: tear-fall linear forwards;
      opacity: 0.5;
    }
    @keyframes tear-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-text">🌪️ 今天磁场不对，<br>我想发疯。</div>

  <button class="btn" id="ventBtn">💥 发泄一下</button>

  <div class="counter-bar">
    已发疯 <span class="count" id="countDisplay">0</span> 次
    <div class="hint" id="hintText">按空格也能发泄</div>
  </div>

  <div class="output" id="output">
    <div class="quote" style="border-left-color:#333;color:#555;">↯ 点一下按钮，开始发疯 ↯</div>
  </div>

  <div class="footer">台风还没来，我先疯了</div>
</div>

<!-- 弹窗遮罩 -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="emoji" id="popupEmoji">😵‍💫</div>
    <div class="title" id="popupTitle">标题</div>
    <div class="desc" id="popupDesc">描述</div>
    <button class="close-btn" id="popupClose">继续发疯</button>
  </div>
</div>

<script>
// ==================== 语录库 ====================
const quotes = [
  "想把这台风扔出去。",
  "落地窗你挺住，我也在挺。",
  "我不想思考了，脑子进水了。",
  "这风比我前任还纠缠不清。",
  "人类为什么要上班？台风都知道休息。",
  "世界是一个巨大的台风。",
  "暴雨：你还好吗？ 我：不好。",
  "我现在就是一株被吹散的蒲公英。",
  "别跟我说话，我在和台风冷战。",
  "天漏了，我的精神状态也漏了。",
  "如果这就是世界末日，能不能快点。",
  "风好大，把我仅存的那点理智也吹走了。",
  "我觉得我现在能和这台风打一架。",
  "警报：我本人已进入疯癫模式。",
  "明天不上班——这是台风帮我做的决定。",
  "我的沉默震耳欲聋，比台风还吵。",
  "今天不适合做人，适合做一棵被吹倒的树。",
  "老天爷是在发脾气，那我也发一个。",
  "没有一条短信比台风预警更让我心凉。",
  "这个天气，适合躺着等世界毁灭。",
  "烦死了！！！！！！！！！！",
  "都给我滚蛋！！！！",
  "大傻逼！！！",
  "我现在的耐心，比落地窗上的胶带还脆弱。",
  "全部毁灭吧，赶紧的。",
  "滚啊！！！！！！！！！",
  "今天谁都别惹我，台风也不行。",
  "艹，这日子一天都过不下去了。",
  "你问我怎么了？我也不知道，就是想骂人。",
  "闭嘴闭嘴闭嘴闭嘴闭嘴闭嘴闭嘴闭嘴。",
  "我现在就是一台行走的暴躁机器。",
  "外面在刮台风，里面在刮我。",
  "今天情绪管理已下线，请稍后再联系。",
  "我觉得我比台风还疯，凭什么它上热搜。",
  "别跟我讲道理，我今天不讲道理。",
  "爆炸吧世界，我已经准备好了。",
  "累了，毁灭吧，随便。",
  "我现在看什么都像出气筒。",
  "社交功能已关闭，有事烧纸。",
  "我很好。我装的。",
  "救命，但我也不知道我在喊谁救命。",
  "滚蛋滚蛋滚蛋滚蛋滚蛋。",
  "滚！！！！！！！！",
  "滚啊！！！！",
  "滚！！！",
  "爬！！！！",
  "滚远点！！！！！",
  "你谁啊？？？滚。",
  "操！！！！！！",
  "啊！！！！！！！！！！",
  "啊啊啊啊啊啊啊！！",
  "啊啊啊啊啊啊啊啊啊啊！！！",
  "啊啊啊啊啊啊啊啊啊啊啊啊啊啊！！",
  "烦死了滚啊！！",
  "都给我爬！！",
  "别烦我！！",
  "毁灭吧！！",
  "淦！！",
  "滚！！！不想说话。",
  "滚犊子！！",
  "哪凉快哪呆着去！！",
  "gun！！",
  "人活着到底为了什么？？滚！！",
  "今天我不想当人。",
  "闭嘴滚蛋一条龙。",
  "莫挨老子！！",
  "我他妈心态崩了。",
  "😡😡😡😡😡",
  "此时此刻只想对全世界说：滚。",
  "不要跟我说话，也不要跟台风说话。",
  "已疯，勿扰。",
  "生而为人，我很暴躁。",
  "今天没有理智这个东西。",
  "我就是个炸弹，别碰我。",
  "发疯结束。并没有。继续发。",
  "心情：雷暴预警。",
];

// ==================== DOM 引用 ====================
const btn = document.getElementById('ventBtn');
const output = document.getElementById('output');
const countDisplay = document.getElementById('countDisplay');
const hintText = document.getElementById('hintText');
const overlay = document.getElementById('overlay');
const popupEmoji = document.getElementById('popupEmoji');
const popupTitle = document.getElementById('popupTitle');
const popupDesc = document.getElementById('popupDesc');
const popupClose = document.getElementById('popupClose');

// ==================== 计数器 & 彩蛋配置 ====================
let clickCount = 0;
let triggeredMilestones = new Set();

const milestones = [
  // 隐藏提示
  { count: 1,  emoji: '👀', title: '第一次', desc: '好的，你开始发疯了。这才第一次，路还长。' },
  // 温和摇晃
  { count: 5,  emoji: '🙃', title: '有点意思了', desc: '你已经按了 5 次。手不累吗？' },

  // ★ 10次：剧烈摇晃 + 弹窗
  { count: 10, emoji: '😵', title: '你还好吗？', desc: '屏幕为什么在晃？哦，是你在晃。\n你已经按了 10 次了，停得下来吗？' },

  // 闪烁 + 暗红滤镜
  { count: 20, emoji: '🫨', title: '20 次了', desc: '你还好吗？真的还好吗？\n屏幕闪得比我的精神状态还不稳定。' },

  // 25次：哭哭表情雨
  { count: 25, emoji: '😭', title: '泪崩时刻', desc: '25 次了！下起了 emoji 泪雨 💧\n哭吧哭吧不是罪。' },

  // 42次：生命宇宙以及一切的答案
  { count: 42, emoji: '🤯', title: '答案是 42', desc: '你已经按了 42 次。\n生命、宇宙以及一切的答案——就是发疯。' },

  // ★ 50次：全屏倒置 + 镜像
  { count: 50, emoji: '🔄', title: '世界颠倒', desc: '50 次了，天翻地覆。\n倒过来看，一切都合理了。持续 3 秒，稳住。' },

  // 69次
  { count: 69, emoji: '😏', title: '（自动消音）', desc: '69。\n嗯。\n你懂的。\n我们继续。' },

  // 80次：满屏血红
  { count: 80, emoji: '🩸', title: '血压拉满', desc: '80 次了，血压已经爆表。\n红色预警：你已进入狂暴状态。' },

  // ★ 100次：五彩纸屑 + 称号
  { count: 100, emoji: '🎊', title: '🎉 恭喜你！', desc: '已获得「发疯大师」称号 🏆\n你成功按了 100 次发泄按钮。\n建议：去休息一下，或者再按 100 次。' },

  // 120次
  { count: 120, emoji: '💀', title: '你已经死了', desc: '（精神意义上）\n120 次了，你的手指还活着吗？' },

  // 150次
  { count: 150, emoji: '👹', title: '终极疯魔', desc: '150 次！你已经超越了发疯的范畴。\n你现在就是台风本人。' },

  // ★ 200次：终极 ALL IN
  { count: 200, emoji: '🤡', title: '你赢了', desc: '200 次。\n你真的把所有的情绪都发泄完了。\n页面上方为你升起一颗太阳 ☀️\n——好吧并没有，还是阴天。\n但你是冠军 🏆' },
];

// ==================== 彩蛋触发器 ====================
function checkMilestones(count) {
  for (const m of milestones) {
    if (count === m.count && !triggeredMilestones.has(m.count)) {
      triggeredMilestones.add(m.count);

      // 特殊效果 —— 根据次数触发不同的全屏特效
      switch (m.count) {
        case 5:
          // 轻微晃一下
          document.body.classList.add('shaking');
          setTimeout(() => document.body.classList.remove('shaking'), 700);
          break;

        case 10:
          // 剧烈摇晃 + 弹窗
          document.body.classList.add('shaking');
          setTimeout(() => document.body.classList.remove('shaking'), 700);
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 20:
          // 闪烁 + 暗红滤镜
          document.body.classList.add('flicker', 'blood-flash');
          setTimeout(() => {
            document.body.classList.remove('flicker', 'blood-flash');
          }, 1600);
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 25:
          // emoji 泪雨
          triggerCryingRain();
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 42:
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 50:
          // 全屏倒置 + 镜像 3 秒
          document.body.classList.add('flipped');
          showPopup(m.emoji, m.title, m.desc);
          setTimeout(() => {
            document.body.classList.remove('flipped');
          }, 3000);
          break;

        case 69:
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 80:
          // 血红滤镜
          document.body.classList.add('blood-flash');
          setTimeout(() => document.body.classList.remove('blood-flash'), 1600);
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 100:
          // 五彩纸屑 + 弹窗
          triggerConfetti();
          setTimeout(() => showPopup(m.emoji, m.title, m.desc), 800);
          break;

        case 120:
          // 闪烁
          document.body.classList.add('flicker');
          setTimeout(() => document.body.classList.remove('flicker'), 900);
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 150:
          // 摇晃 + flicker + 血红 一起上
          document.body.classList.add('shaking', 'flicker', 'blood-flash');
          setTimeout(() => {
            document.body.classList.remove('shaking', 'flicker', 'blood-flash');
          }, 1800);
          showPopup(m.emoji, m.title, m.desc);
          break;

        case 200:
          // ALL IN: 五彩纸屑 + 翻转 + 闪烁 + 弹窗
          triggerConfetti();
          document.body.classList.add('flipped', 'flicker');
          setTimeout(() => {
            document.body.classList.remove('flipped', 'flicker');
          }, 3500);
          setTimeout(() => showPopup(m.emoji, m.title, m.desc), 800);
          break;

        default:
          if (m.count >= 1) {
            showPopup(m.emoji, m.title, m.desc);
          }
          break;
      }
      return; // 一次只触发一个彩蛋
    }
  }
}

// ==================== 弹窗 ====================
function showPopup(emoji, title, desc) {
  popupEmoji.textContent = emoji;
  popupTitle.textContent = title;
  popupDesc.textContent = desc;
  overlay.classList.add('active');
}

popupClose.addEventListener('click', () => {
  overlay.classList.remove('active');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.classList.remove('active');
  }
});

// ==================== 五彩纸屑 ====================
function triggerConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d', '#c084fc', '#fb923c'];
  const shapes = ['■', '●', '▲', '★', '♦'];

  for (let i = 0; i < 200; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.fontSize = (Math.random() * 16 + 8) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(el);
  }

  setTimeout(() => {
    container.remove();
  }, 4000);
}

// ==================== 哭泣 emoji 雨 ====================
function triggerCryingRain() {
  const container = document.createElement('div');
  container.className = 'crying-rain';
  document.body.appendChild(container);

  const tears = ['😭', '😢', '🥲', '💧', '😿', '🌧️'];

  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'tear';
    el.textContent = tears[Math.floor(Math.random() * tears.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (Math.random() * 20 + 16) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    container.appendChild(el);
  }

  setTimeout(() => {
    container.remove();
  }, 4500);
}

// ==================== 单击主逻辑 ====================
btn.addEventListener('click', () => {
  clickCount++;
  countDisplay.textContent = clickCount;

  // 更新底部小字提示
  if (clickCount >= 100) {
    hintText.textContent = '你已经是个成熟的发疯选手了';
  } else if (clickCount >= 50) {
    hintText.textContent = '还在按？你真的还好吗？';
  } else if (clickCount >= 20) {
    hintText.textContent = '你已经停不下来了，对吧？';
  } else if (clickCount >= 10) {
    hintText.textContent = '10 次了，要不要休息一下？不，继续。';
  }

  // 检查彩蛋
  checkMilestones(clickCount);

  // 出语录
  output.classList.add('fade');
  setTimeout(() => {
    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    output.innerHTML = `<div class="quote">${quote}</div>`;
    output.classList.remove('fade');
  }, 150);
});

// 键盘快捷键：按空格发泄
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && e.target === document.body) {
    e.preventDefault();
    btn.click();
  }
});

// ==================== 鼠标痕迹：发疯字样 ====================
const trailChars = ['发', '疯', '💥', '🌪️', '😡'];
let trailThrottle = 0;

document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if (now - trailThrottle < 40) return; // 节流，避免太多
  trailThrottle = now;

  const el = document.createElement('div');
  el.className = 'mouse-trail';
  el.textContent = trailChars[Math.floor(Math.random() * trailChars.length)];
  el.style.left = (e.clientX - 10) + 'px';
  el.style.top = (e.clientY - 10) + 'px';

  // 随机一点颜色变化
  const hues = [0, 30, 200, 300, 0];
  el.style.color = `hsl(${hues[Math.floor(Math.random() * hues.length)]}, 30%, 45%)`;
  el.style.fontSize = (Math.random() * 8 + 14) + 'px';

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
});
</script>
</body>
